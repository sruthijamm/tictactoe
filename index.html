<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TicTacToe AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #f0eeff;
      background-image:
        radial-gradient(ellipse at 15% 15%, rgba(167,139,250,0.25) 0%, transparent 50%),
        radial-gradient(ellipse at 85% 85%, rgba(244,114,182,0.2) 0%, transparent 50%);
      font-family: 'Outfit', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 60px;
      gap: 22px;
      color: #1a1a2e;
    }

    h1 {
      font-size: 2.6rem;
      font-weight: 800;
      letter-spacing: 0.02em;
      background: linear-gradient(90deg, #7c6ff7, #e879a0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 0.82rem;
      color: rgba(26,26,46,0.45);
      margin-top: -14px;
      letter-spacing: 0.06em;
    }

    .glass {
      background: rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(124,111,247,0.08);
    }

    .difficulty {
      display: flex;
      gap: 8px;
    }

    .difficulty button {
      padding: 8px 20px;
      border-radius: 999px;
      border: 1.5px solid rgba(124,111,247,0.2);
      background: rgba(255,255,255,0.7);
      color: rgba(26,26,46,0.5);
      font-family: 'Outfit', sans-serif;
      font-size: 0.83rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .difficulty button.active {
      background: linear-gradient(135deg, #7c6ff7, #e879a0);
      border-color: transparent;
      color: #fff;
      font-weight: 600;
      box-shadow: 0 4px 14px rgba(124,111,247,0.3);
    }

    .difficulty button:hover:not(.active) {
      border-color: rgba(124,111,247,0.4);
      color: #7c6ff7;
    }

    .score {
      display: flex;
      padding: 14px 32px;
      gap: 0;
    }

    .score-item {
      text-align: center;
      padding: 0 24px;
    }

    .score-item:not(:last-child) {
      border-right: 1px solid rgba(124,111,247,0.15);
    }

    .score-item strong {
      display: block;
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(135deg, #7c6ff7, #e879a0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .score-item span {
      font-size: 0.7rem;
      color: rgba(26,26,46,0.4);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .center-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 100%;
      max-width: 360px;
    }

    .board-wrapper { position: relative; }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 96px);
      grid-template-rows: repeat(3, 96px);
      gap: 10px;
      padding: 14px;
    }

    .cell {
      width: 96px;
      height: 96px;
      background: rgba(255,255,255,0.75);
      border: 1.5px solid rgba(124,111,247,0.12);
      border-radius: 16px;
      font-size: 2.4rem;
      font-weight: 800;
      font-family: 'Outfit', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s, transform 0.12s, border-color 0.2s, box-shadow 0.2s;
      user-select: none;
      position: relative;
    }

    .cell:hover:not(.taken) {
      background: rgba(167,139,250,0.12);
      border-color: rgba(124,111,247,0.4);
      transform: scale(1.05);
      box-shadow: 0 4px 16px rgba(124,111,247,0.15);
    }

    .cell.x { color: #7c6ff7; }
    .cell.o { color: #e879a0; }
    .cell.taken { cursor: not-allowed; }

    .cell.hint-cell {
      border-color: #f59e0b !important;
      background: rgba(245,158,11,0.08) !important;
      animation: pulse-hint 1.1s ease infinite;
    }

    @keyframes pulse-hint {
      0%,100% { box-shadow: 0 0 0 0 rgba(245,158,11,0.3); }
      50%      { box-shadow: 0 0 0 8px rgba(245,158,11,0); }
    }

    .win-line {
      position: absolute;
      background: linear-gradient(90deg, #7c6ff7, #e879a0);
      border-radius: 4px;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.35s;
      pointer-events: none;
    }
    .win-line.show { opacity: 1; }

    .commentary-box {
      width: 100%;
      padding: 14px 18px;
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .commentary-box p {
      text-align: center;
      font-size: 0.9rem;
      color: rgba(26,26,46,0.6);
      font-style: italic;
      line-height: 1.55;
    }

    .status {
      font-size: 1.05rem;
      font-weight: 600;
      min-height: 24px;
      text-align: center;
    }
    .status.win  { color: #7c6ff7; }
    .status.lose { color: #e879a0; }
    .status.tie  { color: rgba(26,26,46,0.4); }

    .thinking {
      font-size: 0.75rem;
      color: rgba(26,26,46,0.3);
      min-height: 14px;
    }

    .buttons { display: flex; gap: 10px; }

    .btn {
      padding: 10px 24px;
      border-radius: 999px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.87rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, #7c6ff7, #e879a0);
      color: #fff;
      box-shadow: 0 4px 14px rgba(124,111,247,0.3);
    }
    .btn-primary:hover { opacity: 0.88; transform: scale(1.03); }

    .btn-secondary {
      background: rgba(255,255,255,0.8);
      border: 1.5px solid rgba(124,111,247,0.2);
      color: #7c6ff7;
    }
    .btn-secondary:hover { background: rgba(167,139,250,0.1); transform: scale(1.03); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; }

    .history-box {
      width: 100%;
      padding: 14px 16px;
    }

    .history-box h3 {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(26,26,46,0.35);
      margin-bottom: 10px;
    }

    .move-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      max-height: 110px;
      overflow-y: auto;
    }

    .move-item {
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(124,111,247,0.12);
      color: rgba(26,26,46,0.6);
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .badge {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 999px;
      flex-shrink: 0;
    }
    .badge-x { background: rgba(124,111,247,0.15); color: #7c6ff7; }
    .badge-o { background: rgba(232,121,160,0.15); color: #e879a0; }

    .move-list::-webkit-scrollbar { width: 2px; }
    .move-list::-webkit-scrollbar-thumb { background: rgba(124,111,247,0.2); border-radius: 2px; }

    @media (max-width: 480px) {
      h1 { font-size: 1.9rem; }
      .board { grid-template-columns: repeat(3, 84px); grid-template-rows: repeat(3, 84px); }
      .cell { width: 84px; height: 84px; font-size: 2rem; }
      .center-col { max-width: 100%; }
    }
  </style>
</head>
<body>

  <h1>Tic Tac Toe</h1>
  <p class="subtitle">You are X &nbsp;·&nbsp; AI is O</p>

  <div class="difficulty">
    <button onclick="setDifficulty('easy')"   id="btn-easy">Easy</button>
    <button onclick="setDifficulty('medium')" id="btn-medium">Medium</button>
    <button onclick="setDifficulty('hard')"   id="btn-hard" class="active">Unbeatable</button>
  </div>

  <div class="glass score">
    <div class="score-item"><strong id="score-x">0</strong><span>You</span></div>
    <div class="score-item"><strong id="score-tie">0</strong><span>Ties</span></div>
    <div class="score-item"><strong id="score-o">0</strong><span>AI</span></div>
  </div>

  <div class="center-col">

    <div class="board-wrapper">
      <div class="board glass" id="board"></div>
      <div class="win-line" id="win-line"></div>
    </div>

    <p class="thinking" id="thinking"></p>

    <div class="commentary-box glass">
      <p id="commentary">Make your first move!</p>
    </div>

    <p class="status" id="status"></p>

    <div class="buttons">
      <button class="btn btn-primary" onclick="resetGame()">New Game</button>
      <button class="btn btn-secondary" id="hint-btn" onclick="getHint()">💡 Hint</button>
    </div>

    <div class="history-box glass">
      <h3>Move history</h3>
      <div class="move-list" id="move-list"></div>
    </div>

  </div>

<script>
  let board = Array(9).fill(' ');
  let gameOver = false;
  let difficulty = 'hard';
  let scores = { X: 0, O: 0, tie: 0 };
  let playerLetter = 'X';
  let aiLetter = 'O';
  let moveCount = 0;
  let hintSquare = null;

  const WIN_COMBOS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

  function setDifficulty(d) {
    difficulty = d;
    document.querySelectorAll('.difficulty button').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + (d === 'hard' ? 'hard' : d)).classList.add('active');
    resetGame();
  }

  function renderBoard() {
    const boardEl = document.getElementById('board');
    boardEl.innerHTML = '';
    board.forEach((cell, i) => {
      const div = document.createElement('div');
      let cls = 'cell';
      if (cell === 'X') cls += ' x taken';
      else if (cell === 'O') cls += ' o taken';
      if (i === hintSquare && cell === ' ') cls += ' hint-cell';
      div.className = cls;
      div.textContent = cell === ' ' ? '' : cell;
      div.onclick = () => humanMove(i);
      boardEl.appendChild(div);
    });
  }

  function addMoveToHistory(letter, square) {
    moveCount++;
    const list = document.getElementById('move-list');
    const item = document.createElement('div');
    item.className = 'move-item';
    const col = (square % 3) + 1;
    const row = Math.floor(square / 3) + 1;
    item.innerHTML = `<span class="badge badge-${letter.toLowerCase()}">${letter}</span> R${row}C${col}`;
    list.appendChild(item);
    list.scrollTop = list.scrollHeight;
  }

  function drawWinLine(combo) {
    const wrapRect = document.querySelector('.board-wrapper').getBoundingClientRect();
    const cells = document.querySelectorAll('.cell');
    const c1 = cells[combo[0]].getBoundingClientRect();
    const c2 = cells[combo[2]].getBoundingClientRect();
    const x1 = c1.left + c1.width/2  - wrapRect.left;
    const y1 = c1.top  + c1.height/2 - wrapRect.top;
    const x2 = c2.left + c2.width/2  - wrapRect.left;
    const y2 = c2.top  + c2.height/2 - wrapRect.top;
    const length = Math.sqrt((x2-x1)**2 + (y2-y1)**2);
    const angle  = Math.atan2(y2-y1, x2-x1) * 180 / Math.PI;
    const line = document.getElementById('win-line');
    line.style.cssText = `width:${length}px;height:5px;left:${x1}px;top:${y1-2.5}px;transform-origin:0 50%;transform:rotate(${angle}deg)`;
    line.classList.add('show');
  }

  function checkWinner(b, letter) {
    return WIN_COMBOS.some(c => c.every(i => b[i] === letter));
  }

  function getWinCombo(b, letter) {
    return WIN_COMBOS.find(c => c.every(i => b[i] === letter));
  }

  async function humanMove(i) {
    if (gameOver || board[i] !== ' ') return;
    hintSquare = null;
    board[i] = playerLetter;
    addMoveToHistory(playerLetter, i);
    renderBoard();

    const humanWin = checkWinner(board, playerLetter);
    const tie = !humanWin && board.every(c => c !== ' ');

    if (humanWin || tie) {
      endGame(humanWin ? playerLetter : null);
      return;
    }

    document.getElementById('thinking').textContent = 'AI is thinking...';
    document.getElementById('commentary').textContent = '';

    try {
      const res = await fetch('/move', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ board, difficulty, player_letter: playerLetter, ai_letter: aiLetter })
      });
      const data = await res.json();
      const aiPos = data.board.findIndex((cell, idx) => cell !== board[idx] && cell === aiLetter);
      board = data.board;
      if (aiPos >= 0) addMoveToHistory(aiLetter, aiPos);
      renderBoard();
      document.getElementById('thinking').textContent = '';
      document.getElementById('commentary').textContent = data.commentary;
      if (data.game_over) endGame(data.winner);
    } catch (e) {
      document.getElementById('thinking').textContent = 'Error reaching server.';
    }
  }

  function endGame(winner) {
    gameOver = true;
    const statusEl = document.getElementById('status');
    if (winner === playerLetter) {
      statusEl.textContent = '🎉 You win!';
      statusEl.className = 'status win';
      scores.X++;
      const combo = getWinCombo(board, playerLetter);
      if (combo) setTimeout(() => drawWinLine(combo), 100);
    } else if (winner === aiLetter) {
      statusEl.textContent = 'AI wins this round!';
      statusEl.className = 'status lose';
      scores.O++;
      const combo = getWinCombo(board, aiLetter);
      if (combo) setTimeout(() => drawWinLine(combo), 100);
    } else {
      statusEl.textContent = "It's a tie!";
      statusEl.className = 'status tie';
      scores.tie++;
    }
    document.getElementById('score-x').textContent   = scores.X;
    document.getElementById('score-o').textContent   = scores.O;
    document.getElementById('score-tie').textContent = scores.tie;
  }

  async function getHint() {
    if (gameOver) return;
    const btn = document.getElementById('hint-btn');
    btn.textContent = 'Thinking...';
    btn.disabled = true;
    hintSquare = null;

    try {
      const res = await fetch(`/hint?board=${encodeURIComponent(JSON.stringify(board))}&difficulty=${difficulty}`);
      const data = await res.json();
      document.getElementById('commentary').textContent = '💡 ' + data.hint;
      const match = data.hint.match(/square\s+(\d)/i) || data.hint.match(/\bplay\s+(\d)\b/i) || data.hint.match(/\b([0-8])\b/);
      if (match) { hintSquare = parseInt(match[1]); renderBoard(); }
    } catch (e) {
      document.getElementById('commentary').textContent = 'Could not get hint.';
    }

    btn.textContent = '💡 Hint';
    btn.disabled = false;
  }

  function resetGame() {
    board = Array(9).fill(' ');
    gameOver = false;
    moveCount = 0;
    hintSquare = null;
    document.getElementById('status').textContent = '';
    document.getElementById('status').className = 'status';
    document.getElementById('commentary').textContent = 'Make your first move!';
    document.getElementById('thinking').textContent = '';
    document.getElementById('move-list').innerHTML = '';
    document.getElementById('win-line').classList.remove('show');
    renderBoard();
  }

  renderBoard();
</script>
</body>
</html>
